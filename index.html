<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>도훈 & 경은 가계부 ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f3ef;
  --surface: #ffffff;
  --surface2: #fdf9f6;
  --rose: #e8785a;
  --rose-light: #f5d5cc;
  --rose-dark: #c45c40;
  --green: #5a9e7a;
  --green-light: #c8e6d5;
  --green-dark: #3d7a58;
  --gold: #c9963a;
  --gold-light: #f0deb4;
  --brown: #3d2b1f;
  --brown2: #7a5c4a;
  --brown3: #b89080;
  --border: rgba(61,43,31,0.1);
  --shadow-sm: 0 2px 8px rgba(61,43,31,0.08);
  --shadow-md: 0 4px 20px rgba(61,43,31,0.12);
  --shadow-lg: 0 8px 40px rgba(61,43,31,0.16);
  --radius-sm: 12px;
  --radius-md: 18px;
  --radius-lg: 24px;
  --dohun: #4a7fa8;
  --dohun-light: #d0e6f5;
  --kyungeun: #c96ea0;
  --kyungeun-light: #f5d5ea;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Pretendard', 'Gowun Dodum', sans-serif; background: var(--bg); color: var(--brown); min-height:100vh; overflow-x:hidden; }

/* ── MODAL BASE ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(30,20,15,0.5);
  z-index: 500; display: flex; align-items: flex-end; justify-content: center;
  backdrop-filter: blur(4px); opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-sheet {
  background: var(--surface); border-radius: 28px 28px 0 0;
  width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto;
  padding: 0 0 env(safe-area-inset-bottom);
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 99px; margin: 14px auto 0; }
.modal-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-header h3 { font-size: 17px; font-weight: 700; }
.modal-close { background: var(--bg); border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; display:flex;align-items:center;justify-content:center; }
.modal-body { padding: 20px; }

/* ── LOGIN ── */
#login-screen {
  min-height: 100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding: 40px 24px;
  background: radial-gradient(ellipse at 30% 20%, #f5e6df 0%, var(--bg) 60%),
              radial-gradient(ellipse at 80% 80%, #d5e8df 0%, transparent 60%);
}
.couple-photo-wrap {
  width: 140px; height: 140px; border-radius: 50%;
  overflow: hidden; margin-bottom: 20px;
  border: 4px solid white;
  box-shadow: 0 8px 32px rgba(232,120,90,0.3), 0 0 0 2px var(--rose-light);
  animation: heartbeat 3s ease-in-out infinite;
}
.couple-photo { width: 100%; height: 100%; object-fit: cover; object-position: center; }
.photo-fallback {
  width: 100%; height: 100%; display:flex; align-items:center; justify-content:center;
  font-size: 56px; background: linear-gradient(135deg, var(--rose-light), var(--kyungeun-light));
}
@keyframes heartbeat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
.login-title { font-size: 28px; font-weight: 700; color: var(--brown); margin-bottom: 6px; letter-spacing:-0.5px; }
.login-names { font-size: 15px; color: var(--brown2); margin-bottom: 48px; display:flex;align-items:center;gap:8px; }
.name-dohun { color: var(--dohun); font-weight:600; }
.name-kyungeun { color: var(--kyungeun); font-weight:600; }
.google-btn {
  display:flex; align-items:center; gap:12px;
  background: white; border: 1.5px solid var(--border);
  border-radius: 16px; padding: 14px 28px;
  font-family: inherit; font-size: 15px; font-weight:600;
  color: var(--brown); cursor: pointer;
  box-shadow: var(--shadow-md);
  transition: all 0.2s;
}
.google-btn:hover { border-color: var(--rose); box-shadow: var(--shadow-lg); transform: translateY(-2px); }
.google-btn img { width: 20px; height: 20px; }

/* ── HEADER ── */
.app-header {
  background: var(--surface);
  padding: 16px 20px 12px;
  padding-top: calc(16px + env(safe-area-inset-top));
  border-bottom: 1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  position: sticky; top: 0; z-index: 50;
}
.header-left { display:flex; align-items:center; gap:10px; }
.user-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  display:flex; align-items:center; justify-content:center;
  font-size: 13px; font-weight: 700; color: white;
}
.avatar-dohun { background: var(--dohun); }
.avatar-kyungeun { background: var(--kyungeun); }
.user-name-tag { font-size: 14px; font-weight: 600; color: var(--brown); }
.logout-btn {
  background: var(--bg); border: none; border-radius: 10px;
  padding: 6px 12px; font-size: 12px; font-weight: 500;
  color: var(--brown3); cursor: pointer; font-family: inherit;
}

/* ── MONTH NAV ── */
.month-nav {
  background: var(--surface); padding: 12px 20px;
  display:flex; align-items:center; justify-content:center; gap:20px;
  border-bottom: 1px solid var(--border);
}
.month-arrow {
  background: var(--bg); border: none; width: 36px; height: 36px;
  border-radius: 50%; font-size: 18px; cursor: pointer; color: var(--brown2);
  display:flex; align-items:center; justify-content:center;
  transition: all 0.15s;
}
.month-arrow:hover { background: var(--rose-light); color: var(--rose-dark); }
.month-label { font-size: 18px; font-weight: 700; min-width: 110px; text-align:center; }

/* ── SUMMARY CARDS ── */
.summary-wrap { padding: 16px; display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.sum-card {
  background: var(--surface); border-radius: var(--radius-md);
  padding: 14px 10px; text-align:center;
  box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
}
.sum-card::before {
  content:''; position:absolute; top:-20px; right:-20px;
  width:60px; height:60px; border-radius:50%; opacity:0.12;
}
.sum-card.income::before { background: var(--green); }
.sum-card.expense::before { background: var(--rose); }
.sum-card.balance::before { background: var(--gold); }
.sum-icon { font-size: 18px; margin-bottom: 4px; }
.sum-label { font-size: 10px; color: var(--brown3); margin-bottom: 5px; font-weight:500; }
.sum-amount { font-size: 14px; font-weight: 700; }
.sum-card.income .sum-amount { color: var(--green); }
.sum-card.expense .sum-amount { color: var(--rose); }
.sum-card.balance .sum-amount { color: var(--gold); }

/* ── BUDGET ── */
.budget-card {
  margin: 0 16px 14px; background: var(--surface);
  border-radius: var(--radius-md); padding: 16px;
  box-shadow: var(--shadow-sm);
}
.budget-top { display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px; }
.budget-label { font-size: 13px; color: var(--brown2); font-weight:600; }
.budget-info { font-size: 13px; font-weight: 700; }
.budget-bar-bg { background: var(--bg); border-radius: 99px; height: 8px; overflow:hidden; }
.budget-bar-fill { height:100%; border-radius:99px; transition: width 0.5s ease; }
.budget-bar-fill.safe { background: linear-gradient(90deg, var(--green), var(--green-dark)); }
.budget-bar-fill.warn { background: linear-gradient(90deg, var(--gold), #e0a020); }
.budget-bar-fill.over { background: linear-gradient(90deg, var(--rose), var(--rose-dark)); }
.budget-set-row { display:flex; gap:8px; margin-top:10px; }
.budget-input {
  flex:1; border: 1.5px solid var(--border); border-radius: 10px;
  padding: 8px 12px; font-family: inherit; font-size: 13px;
  color: var(--brown); background: var(--bg); outline:none;
}
.budget-input:focus { border-color: var(--rose); }
.budget-set-btn {
  background: var(--rose); color: white; border:none;
  border-radius: 10px; padding: 8px 16px; font-size: 13px;
  font-weight: 600; cursor: pointer; font-family: inherit;
}

/* ── SECTION HEADER ── */
.section-head { display:flex; justify-content:space-between; align-items:center; padding: 0 16px 10px; }
.section-title { font-size: 14px; font-weight: 700; color: var(--brown); }
.section-action { font-size: 12px; color: var(--rose); font-weight:600; cursor:pointer; }

/* ── TX LIST ── */
.tx-list { padding: 0 16px 100px; }
.date-group { margin-bottom: 18px; }
.date-label {
  font-size: 11px; font-weight:700; color: var(--brown3);
  margin-bottom: 8px; padding-left: 4px;
  text-transform:uppercase; letter-spacing:0.5px;
}
.tx-item {
  background: var(--surface); border-radius: var(--radius-sm);
  padding: 13px 14px; display:flex; align-items:center; gap:12px;
  margin-bottom: 7px; box-shadow: var(--shadow-sm);
  cursor: pointer; transition: all 0.15s; position: relative;
  border-left: 3px solid transparent;
}
.tx-item:hover { box-shadow: var(--shadow-md); transform: translateX(2px); }
.tx-item.expense { border-left-color: var(--rose); }
.tx-item.income { border-left-color: var(--green); }
.tx-emoji {
  width: 40px; height: 40px; border-radius: 12px;
  display:flex; align-items:center; justify-content:center; font-size:20px;
  flex-shrink:0;
}
.tx-emoji.expense { background: var(--rose-light); }
.tx-emoji.income { background: var(--green-light); }
.tx-middle { flex:1; min-width:0; }
.tx-desc { font-size: 14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tx-meta { display:flex; align-items:center; gap:6px; margin-top: 3px; }
.tx-cat { font-size: 11px; color: var(--brown3); }
.tx-who {
  font-size: 10px; font-weight:700; padding: 2px 7px;
  border-radius: 99px; color: white; flex-shrink:0;
}
.tx-who.dohun { background: var(--dohun); }
.tx-who.kyungeun { background: var(--kyungeun); }
.tx-memo { font-size: 11px; color: var(--brown3); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tx-right { text-align:right; flex-shrink:0; }
.tx-amount { font-size: 15px; font-weight: 700; }
.tx-amount.expense { color: var(--rose); }
.tx-amount.income { color: var(--green); }
.tx-actions { display:flex; gap:6px; margin-top:4px; justify-content:flex-end; }
.tx-btn { background: var(--bg); border:none; border-radius:8px; padding:3px 8px; font-size:11px; cursor:pointer; font-family:inherit; font-weight:600; color: var(--brown2); }
.tx-btn.delete { color: var(--rose); }

/* ── ADD FORM ── */
.add-page { padding: 16px 16px 100px; }
.type-toggle { display:flex; gap:8px; margin-bottom: 16px; }
.type-btn {
  flex:1; padding: 12px; border-radius: 14px;
  border: 2px solid transparent; font-family: inherit;
  font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s;
}
.type-btn.expense { background: var(--rose-light); color: var(--rose-dark); }
.type-btn.expense.active { background: var(--rose); color: white; }
.type-btn.income { background: var(--green-light); color: var(--green-dark); }
.type-btn.income.active { background: var(--green); color: white; }

.form-card {
  background: var(--surface); border-radius: var(--radius-md);
  padding: 20px; box-shadow: var(--shadow-sm); margin-bottom: 12px;
}
.form-label { font-size: 12px; font-weight:700; color: var(--brown2); margin-bottom: 8px; display:block; }
.form-input, .form-select, .form-textarea {
  width: 100%; border: 1.5px solid var(--border);
  border-radius: 12px; padding: 11px 14px;
  font-family: inherit; font-size: 14px; color: var(--brown);
  background: var(--bg); outline: none; transition: border-color 0.2s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--rose); background: white; }
.form-textarea { resize: none; height: 70px; }
.form-row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
.form-row1 { margin-bottom:12px; }

/* who selector */
.who-toggle { display:flex; gap:8px; }
.who-btn {
  flex:1; padding: 10px 8px; border-radius: 12px;
  border: 2px solid transparent; font-family:inherit;
  font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;
  display:flex; align-items:center; justify-content:center; gap:6px;
}
.who-btn.dohun { background: var(--dohun-light); color: var(--dohun); }
.who-btn.dohun.active { background: var(--dohun); color: white; border-color: #3568a0; }
.who-btn.kyungeun { background: var(--kyungeun-light); color: var(--kyungeun); }
.who-btn.kyungeun.active { background: var(--kyungeun); color: white; border-color: #a05080; }

.amount-input-wrap { position:relative; }
.amount-input-wrap .won { position:absolute; right:14px; top:50%; transform:translateY(-50%); font-size:14px; color:var(--brown3); font-weight:600; }
.amount-input-wrap .form-input { padding-right: 36px; }

.submit-btn {
  width:100%; padding: 15px; background: linear-gradient(135deg, var(--rose), var(--rose-dark));
  color: white; border:none; border-radius: 16px;
  font-family:inherit; font-size: 16px; font-weight: 700;
  cursor: pointer; letter-spacing: 0.5px;
  box-shadow: 0 4px 20px rgba(232,120,90,0.4);
  transition: all 0.2s;
}
.submit-btn:active { transform: scale(0.98); }

/* ── CHART PAGE ── */
.chart-page { padding: 16px 16px 100px; }
.chart-card {
  background: var(--surface); border-radius: var(--radius-md);
  padding: 18px; box-shadow: var(--shadow-sm); margin-bottom: 14px;
}
.chart-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
.cat-bar { margin-bottom: 13px; }
.cat-bar-head { display:flex; justify-content:space-between; font-size: 12px; margin-bottom:6px; font-weight:600; }
.cat-bar-head span:last-child { color: var(--brown3); }
.cat-bar-bg { background: var(--bg); border-radius:99px; height: 7px; overflow:hidden; }
.cat-bar-fill { height:100%; border-radius:99px; background: linear-gradient(90deg, var(--rose-light), var(--rose)); }

.monthly-bars { display:flex; align-items:flex-end; gap:8px; height:90px; margin-bottom:10px; }
.monthly-bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; }
.monthly-bar { width:100%; border-radius:8px 8px 0 0; min-height:4px; transition: height 0.5s ease; }
.monthly-bar.current { background: linear-gradient(to top, var(--rose-dark), var(--rose)); }
.monthly-bar.prev { background: linear-gradient(to top, var(--rose-light), #f0c8be); }
.monthly-bar-label { font-size: 11px; color: var(--brown3); font-weight:600; }
.monthly-row { display:flex; justify-content:space-between; font-size:12px; padding:6px 0; border-bottom:1px solid var(--border); }
.monthly-row:last-child { border-bottom:none; }

/* couple split */
.couple-split { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.couple-card {
  border-radius: var(--radius-md); padding: 16px;
  box-shadow: var(--shadow-sm);
}
.couple-card.dohun-card { background: linear-gradient(135deg, var(--dohun-light), #e8f4ff); border: 1.5px solid rgba(74,127,168,0.2); }
.couple-card.kyungeun-card { background: linear-gradient(135deg, var(--kyungeun-light), #fce8f4); border: 1.5px solid rgba(201,110,160,0.2); }
.couple-name { font-size: 13px; font-weight:700; margin-bottom: 6px; }
.couple-name.d { color: var(--dohun); }
.couple-name.k { color: var(--kyungeun); }
.couple-total { font-size: 20px; font-weight:700; }
.couple-total.d { color: var(--dohun); }
.couple-total.k { color: var(--kyungeun); }
.couple-sub { font-size: 11px; color: var(--brown3); margin-top: 3px; }
.settle-box {
  background: var(--gold-light); border-radius: var(--radius-sm);
  padding: 14px 16px; border: 1.5px solid rgba(201,150,58,0.25);
  text-align: center; margin-top: 4px;
}
.settle-text { font-size: 14px; font-weight: 700; color: var(--gold); }
.settle-sub { font-size: 12px; color: var(--brown3); margin-top: 4px; }

/* ── CALENDAR ── */
.cal-page { padding: 16px 16px 100px; }
.cal-card { background: var(--surface); border-radius: var(--radius-md); padding: 16px; box-shadow: var(--shadow-sm); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-day-label { text-align:center; font-size: 11px; font-weight: 700; color: var(--brown3); padding: 6px 0; }
.cal-day {
  aspect-ratio: 1; border-radius: 10px; display:flex;
  flex-direction:column; align-items:center; justify-content:center;
  cursor: pointer; transition: all 0.15s; position: relative;
  font-size: 13px; font-weight: 600; gap: 2px;
}
.cal-day:hover { background: var(--bg); }
.cal-day.today { background: var(--rose); color: white; }
.cal-day.has-tx::after {
  content:''; position:absolute; bottom:3px;
  width:5px; height:5px; border-radius:50%; background: var(--rose);
}
.cal-day.today.has-tx::after { background: white; }
.cal-day.other-month { color: var(--brown3); opacity:0.4; }
.cal-day-expense { font-size: 9px; color: var(--rose); font-weight: 700; }
.cal-day.today .cal-day-expense { color: rgba(255,255,255,0.9); }

/* ── EMPTY ── */
.empty-state { text-align:center; padding: 48px 20px; }
.empty-emoji { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 14px; color: var(--brown3); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background: var(--surface); border-top: 1px solid var(--border);
  display:flex; padding: 10px 0;
  padding-bottom: calc(10px + env(safe-area-inset-bottom));
  z-index: 100;
  box-shadow: 0 -4px 20px rgba(61,43,31,0.08);
}
.nav-btn {
  flex:1; display:flex; flex-direction:column; align-items:center;
  gap: 3px; background:none; border:none; cursor:pointer;
  padding: 6px; font-family:inherit; transition: all 0.15s;
}
.nav-icon { font-size: 24px; transition: transform 0.2s; }
.nav-label { font-size: 10px; font-weight:600; color: var(--brown3); }
.nav-btn.active .nav-label { color: var(--rose); }
.nav-btn.active .nav-icon { transform: scale(1.1); }

/* ── EDIT MODAL ── */
.edit-modal-body { padding: 20px; }

/* ── CATEGORY CHIPS ── */
.cat-chips { display:flex; flex-wrap:wrap; gap:8px; }
.cat-chip {
  padding: 7px 14px; border-radius: 99px; border: 1.5px solid var(--border);
  background: var(--bg); font-size: 13px; font-weight:600;
  cursor: pointer; transition: all 0.15s; font-family:inherit;
}
.cat-chip.active { background: var(--rose); color: white; border-color: var(--rose-dark); }

/* ── QUICK AMOUNT CHIPS ── */
.quick-chips { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
.quick-chip {
  padding: 5px 12px; border-radius: 99px; background: var(--bg);
  border: 1.5px solid var(--border); font-size: 12px; font-weight:600;
  cursor: pointer; color: var(--brown2); font-family:inherit;
  transition: all 0.15s;
}
.quick-chip:hover { background: var(--rose-light); border-color: var(--rose); color: var(--rose-dark); }

.hidden { display:none !important; }

/* toast */
.toast {
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px);
  background: var(--brown); color: white; border-radius: 14px;
  padding: 11px 20px; font-size: 13px; font-weight:600;
  z-index: 999; opacity:0; transition: all 0.3s; white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* skeleton */
.skel { background: linear-gradient(90deg, var(--bg) 25%, var(--border) 50%, var(--bg) 75%); background-size:200% 100%; animation: skel 1.2s infinite; border-radius:8px; }
@keyframes skel { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="couple-photo-wrap">
    <img src="pic/couple.jpg" class="couple-photo" alt="도훈 & 경은"
         onerror="this.parentElement.innerHTML='<div class=\'photo-fallback\'>❤️</div>'">
  </div>
  <h2 class="login-title">우리 가계부</h2>
  <p class="login-names">
    <span class="name-dohun">도훈</span>
    <span>❤️</span>
    <span class="name-kyungeun">경은</span>
  </p>
  <button class="google-btn" id="login-btn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
    Google로 로그인
  </button>
</div>

<!-- ── APP ── -->
<div id="app-screen" class="hidden">

  <!-- HEADER -->
  <div class="app-header">
    <div class="header-left">
      <div class="user-avatar" id="user-avatar">D</div>
      <span class="user-name-tag" id="user-name-tag">로딩중</span>
    </div>
    <button class="logout-btn" id="logout-btn">로그아웃</button>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, updateDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ── FIREBASE CONFIG ──
const firebaseConfig = {
  apiKey: "AIzaSyAiwlmOmYCrPvIMcL-DUkfxkuTM5REky3Q",
  authDomain: "draftpj-23a75.firebaseapp.com",
  projectId: "draftpj-23a75",
  storageBucket: "draftpj-23a75.firebasestorage.app",
  messagingSenderId: "209227761377",
  appId: "1:209227761377:web:d09607ee8076e1fec999a0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const txCol = collection(db, 'transactions');

// ── STATE ──
let currentType = 'expense';
let currentWho = 'dohun';
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let localTxs = [];
let unsubscribe = null;
let editingId = null;
let editType = 'expense';
let editWho = 'dohun';
let editCategory = '';
let addCategory = '';
let selectedCalDate = null;
let currentUser = null;

const CATEGORIES = {
  expense: [
    { key:'식비', emoji:'🍚' },
    { key:'카페/간식', emoji:'☕' },
    { key:'교통', emoji:'🚌' },
    { key:'쇼핑', emoji:'🛍️' },
    { key:'데이트', emoji:'💑' },
    { key:'문화/여가', emoji:'🎬' },
    { key:'의료/건강', emoji:'💊' },
    { key:'생활/마트', emoji:'🏪' },
    { key:'술/회식', emoji:'🍺' },
    { key:'미용', emoji:'💅' },
    { key:'여행', emoji:'✈️' },
    { key:'기타', emoji:'📦' }
  ],
  income: [
    { key:'월급', emoji:'💵' },
    { key:'용돈', emoji:'🎁' },
    { key:'부수입', emoji:'💼' },
    { key:'이자/배당', emoji:'📈' },
    { key:'환급', emoji:'🔄' },
    { key:'기타수입', emoji:'💫' }
  ]
};

function getCatEmoji(key) {
  const all = [...CATEGORIES.expense, ...CATEGORIES.income];
  return (all.find(c=>c.key===key)||{emoji:'📦'}).emoji;
}

// ── INIT ──
window.changeMonth = changeMonth;
window.setBudget = setBudget;
window.showPage = showPage;
window.setType = setType;
window.setWho = setWho;
window.addTransaction = addTransaction;
window.setEditType = setEditType;
window.setEditWho = setEditWho;
window.saveEdit = saveEdit;
window.closeEditModal = closeEditModal;
window.closeDetailModal = closeDetailModal;
window.addQuickAmount = addQuickAmount;
window.selectCalDate = selectCalDate;

// category chips
function renderCatChips(containerId, cats, activeKey, onSelect) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = cats.map(c=>`
    <button class="cat-chip ${c.key===activeKey?'active':''}" onclick="(${onSelect.toString()})('${c.key}')">
      ${c.emoji} ${c.key}
    </button>`).join('');
}

// ── AUTH ──
document.getElementById('login-btn').onclick = async () => {
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  if (isMobile) {
    await signInWithRedirect(auth, provider);
  } else {
    await signInWithPopup(auth, provider);
  }
};
getRedirectResult(auth).catch(()=>{});
document.getElementById('logout-btn').onclick = () => signOut(auth);

onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app-screen').classList.remove('hidden');
    // set avatar
    const isKyungeun = user.email && (user.email.includes('kyungeun') || user.displayName?.includes('경은'));
    const whoI = isKyungeun ? 'kyungeun' : 'dohun';
    const av = document.getElementById('user-avatar');
    av.textContent = isKyungeun ? '경' : '도';
    av.className = `user-avatar avatar-${whoI}`;
    document.getElementById('user-name-tag').textContent = isKyungeun ? '경은' : '도훈';
    currentWho = whoI;
    document.getElementById('who-dohun').classList.toggle('active', whoI==='dohun');
    document.getElementById('who-kyungeun').classList.toggle('active', whoI==='kyungeun');
    startSync();
    updateMonthLabel();
    initAddForm();
  } else {
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('app-screen').classList.add('hidden');
    if (unsubscribe) unsubscribe();
  }
});

function startSync() {
  if (unsubscribe) unsubscribe();
  unsubscribe = onSnapshot(txCol, snap => {
    localTxs = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderAll();
  });
}

// ── MONTH ──
function updateMonthLabel() {
  document.getElementById('month-label').textContent = `${currentYear}년 ${currentMonth+1}월`;
}
function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth>11) { currentMonth=0; currentYear++; }
  if (currentMonth<0)  { currentMonth=11; currentYear--; }
  updateMonthLabel(); renderAll();
}
function getMonthTx() {
  return localTxs.filter(tx=>{
    const d = new Date(tx.date);
    return d.getFullYear()===currentYear && d.getMonth()===currentMonth;
  });
}

// ── BUDGET ──
function setBudget() {
  const v = parseInt(document.getElementById('budget-input').value);
  if (!v||v<=0) return showToast('올바른 금액을 입력해주세요');
  localStorage.setItem(`budget_${currentYear}_${currentMonth}`, v);
  renderSummary();
  showToast('✅ 예산이 설정됐어요!');
}

// ── SUMMARY ──
function renderSummary() {
  const txs = getMonthTx();
  const income = txs.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0);
  const expense = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0);
  document.getElementById('total-income').textContent = fmt(income);
  document.getElementById('total-expense').textContent = fmt(expense);
  const bal = income - expense;
  const balEl = document.getElementById('total-balance');
  balEl.textContent = fmt(Math.abs(bal));
  balEl.style.color = bal >= 0 ? 'var(--gold)' : 'var(--rose)';

  const budget = parseInt(localStorage.getItem(`budget_${currentYear}_${currentMonth}`)||'0');
  const bar = document.getElementById('budget-bar');
  const info = document.getElementById('budget-info');
  if (budget > 0) {
    const pct = Math.min(100, Math.round(expense/budget*100));
    info.textContent = `${fmt(expense)} / ${fmt(budget)} (${pct}%)`;
    bar.style.width = pct+'%';
    bar.className = 'budget-bar-fill ' + (pct>=100?'over':pct>=80?'warn':'safe');
    document.getElementById('budget-input').value = budget;
  } else {
    info.textContent = '미설정';
    bar.style.width = '0%';
  }
}

// ── TX LIST ──
function renderTxList() {
  const txs = getMonthTx().sort((a,b)=>new Date(b.date)-new Date(a.date));
  const container = document.getElementById('tx-list');
  if (!txs.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-emoji">📭</div><div class="empty-text">이번 달 내역이 없어요<br>+ 추가 버튼으로 기록해보세요</div></div>`;
    return;
  }
  const grouped = {};
  txs.forEach(tx=>{ if(!grouped[tx.date]) grouped[tx.date]=[]; grouped[tx.date].push(tx); });
  container.innerHTML = Object.entries(grouped).map(([date,items])=>`
    <div class="date-group">
      <div class="date-label">${formatDate(date)}</div>
      ${items.map(tx=>txHTML(tx)).join('')}
    </div>`).join('');
}

function txHTML(tx) {
  const whoClass = tx.who==='kyungeun'?'kyungeun':'dohun';
  const whoLabel = tx.who==='kyungeun'?'경은':'도훈';
  const sign = tx.type==='expense'?'-':'+';
  return `
  <div class="tx-item ${tx.type}" onclick="openDetail('${tx.id}')">
    <div class="tx-emoji ${tx.type}">${getCatEmoji(tx.category)}</div>
    <div class="tx-middle">
      <div class="tx-desc">${tx.desc}</div>
      <div class="tx-meta">
        <span class="tx-cat">${tx.category}</span>
        <span class="tx-who ${whoClass}">${whoLabel}</span>
      </div>
      ${tx.memo?`<div class="tx-memo">💬 ${tx.memo}</div>`:''}
    </div>
    <div class="tx-right">
      <div class="tx-amount ${tx.type}">${sign}${fmt(Number(tx.amount))}</div>
    </div>
  </div>`;
}

// ── ADD ──
function initAddForm() {
  addCategory = CATEGORIES.expense[0].key;
  renderCatChips('cat-chips-add', CATEGORIES.expense, addCategory, (key)=>{
    addCategory=key;
    renderCatChips('cat-chips-add', CATEGORIES[currentType], addCategory, arguments.callee);
  });
}

function setType(type) {
  currentType = type;
  document.getElementById('btn-expense').classList.toggle('active', type==='expense');
  document.getElementById('btn-income').classList.toggle('active', type==='income');
  const cats = CATEGORIES[type];
  addCategory = cats[0].key;
  renderCatChips('cat-chips-add', cats, addCategory, (key)=>{
    addCategory=key;
    renderCatChips('cat-chips-add', CATEGORIES[currentType], addCategory, arguments.callee);
  });
}

function setWho(who) {
  currentWho = who;
  document.getElementById('who-dohun').classList.toggle('active', who==='dohun');
  document.getElementById('who-kyungeun').classList.toggle('active', who==='kyungeun');
}

function addQuickAmount(n) {
  const inp = document.getElementById('inp-amount');
  inp.value = (parseInt(inp.value)||0) + n;
}

async function addTransaction() {
  const amount = parseInt(document.getElementById('inp-amount').value);
  const date   = document.getElementById('inp-date').value;
  const desc   = document.getElementById('inp-desc').value.trim();
  const memo   = document.getElementById('inp-memo').value.trim();
  if (!amount||amount<=0) return showToast('금액을 입력해주세요');
  if (!date) return showToast('날짜를 선택해주세요');
  if (!desc) return showToast('내용을 입력해주세요');
  if (!addCategory) return showToast('카테고리를 선택해주세요');
  try {
    await addDoc(txCol, {
      type: currentType, amount, date, desc, memo,
      category: addCategory, who: currentWho,
      createdAt: new Date().toISOString()
    });
    document.getElementById('inp-amount').value='';
    document.getElementById('inp-desc').value='';
    document.getElementById('inp-memo').value='';
    showToast('✅ 추가됐어요!');
    showPage('home');
  } catch(e) { showToast('오류: '+e.message); }
}

// ── DETAIL / EDIT / DELETE ──
function openDetail(id) {
  const tx = localTxs.find(t=>t.id===id);
  if (!tx) return;
  const whoLabel = tx.who==='kyungeun'?'경은':'도훈';
  const sign = tx.type==='expense'?'-':'+';
  const color = tx.type==='expense'?'var(--rose)':'var(--green)';
  document.getElementById('detail-title').textContent = `${getCatEmoji(tx.category)} ${tx.desc}`;
  document.getElementById('detail-body').innerHTML = `
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:40px;margin-bottom:8px">${getCatEmoji(tx.category)}</div>
      <div style="font-size:28px;font-weight:800;color:${color}">${sign}${fmt(Number(tx.amount))}</div>
    </div>
    <div style="background:var(--bg);border-radius:14px;padding:16px;margin-bottom:16px">
      ${detailRow('📅 날짜', formatDate(tx.date))}
      ${detailRow('🏷️ 카테고리', `${getCatEmoji(tx.category)} ${tx.category}`)}
      ${detailRow('👤 누가', tx.who==='kyungeun'?'🩷 경은':'💙 도훈')}
      ${tx.memo?detailRow('💬 메모', tx.memo):''}
    </div>
    <div style="display:flex;gap:10px">
      <button onclick="openEdit('${id}')" style="flex:1;padding:12px;background:var(--gold-light);border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--gold)">✏️ 수정</button>
      <button onclick="deleteTx('${id}')" style="flex:1;padding:12px;background:var(--rose-light);border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--rose)">🗑️ 삭제</button>
    </div>
  `;
  document.getElementById('detail-modal').classList.add('open');
}
function detailRow(label, value) {
  return `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px;color:var(--brown3)">${label}</span><span style="font-size:13px;font-weight:600">${value}</span></div>`;
}
window.closeDetailModal = function() {
  document.getElementById('detail-modal').classList.remove('open');
};
window.openEdit = function(id) {
  closeDetailModal();
  const tx = localTxs.find(t=>t.id===id);
  if (!tx) return;
  editingId = id;
  editType = tx.type;
  editWho = tx.who||'dohun';
  editCategory = tx.category;
  document.getElementById('edit-btn-expense').classList.toggle('active', editType==='expense');
  document.getElementById('edit-btn-income').classList.toggle('active', editType==='income');
  document.getElementById('edit-who-dohun').classList.toggle('active', editWho==='dohun');
  document.getElementById('edit-who-kyungeun').classList.toggle('active', editWho==='kyungeun');
  document.getElementById('edit-amount').value = tx.amount;
  document.getElementById('edit-date').value = tx.date;
  document.getElementById('edit-desc').value = tx.desc;
  document.getElementById('edit-memo').value = tx.memo||'';
  const cats = CATEGORIES[editType];
  renderCatChips('cat-chips-edit', cats, editCategory, (key)=>{
    editCategory=key;
    renderCatChips('cat-chips-edit', CATEGORIES[editType], editCategory, arguments.callee);
  });
  document.getElementById('edit-modal').classList.add('open');
};
window.deleteTx = async function(id) {
  closeDetailModal();
  if (!confirm('삭제할까요?')) return;
  await deleteDoc(doc(db,'transactions',id));
  showToast('🗑️ 삭제됐어요');
};
function setEditType(type) {
  editType = type;
  document.getElementById('edit-btn-expense').classList.toggle('active', type==='expense');
  document.getElementById('edit-btn-income').classList.toggle('active', type==='income');
  editCategory = CATEGORIES[type][0].key;
  renderCatChips('cat-chips-edit', CATEGORIES[type], editCategory, (key)=>{
    editCategory=key;
    renderCatChips('cat-chips-edit', CATEGORIES[editType], editCategory, arguments.callee);
  });
}
function setEditWho(who) {
  editWho = who;
  document.getElementById('edit-who-dohun').classList.toggle('active', who==='dohun');
  document.getElementById('edit-who-kyungeun').classList.toggle('active', who==='kyungeun');
}
async function saveEdit() {
  const amount = parseInt(document.getElementById('edit-amount').value);
  const date   = document.getElementById('edit-date').value;
  const desc   = document.getElementById('edit-desc').value.trim();
  const memo   = document.getElementById('edit-memo').value.trim();
  if (!amount||amount<=0) return showToast('금액을 입력해주세요');
  if (!date) return showToast('날짜를 선택해주세요');
  if (!desc) return showToast('내용을 입력해주세요');
  await updateDoc(doc(db,'transactions',editingId), {
    type: editType, amount, date, desc, memo,
    category: editCategory, who: editWho
  });
  closeEditModal();
  showToast('✅ 수정됐어요!');
}
function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('open');
}

// ── CHART ──
function renderChart() {
  const txs = getMonthTx();
  const expenses = txs.filter(t=>t.type==='expense');
  // couple split
  const dohunAmt = expenses.filter(t=>t.who==='dohun').reduce((s,t)=>s+Number(t.amount),0);
  const kyungeunAmt = expenses.filter(t=>t.who==='kyungeun').reduce((s,t)=>s+Number(t.amount),0);
  document.getElementById('dohun-total').textContent = fmt(dohunAmt);
  document.getElementById('dohun-count').textContent = expenses.filter(t=>t.who==='dohun').length+'건';
  document.getElementById('kyungeun-total').textContent = fmt(kyungeunAmt);
  document.getElementById('kyungeun-count').textContent = expenses.filter(t=>t.who==='kyungeun').length+'건';
  // settle
  const settleEl = document.getElementById('settle-text');
  const settleSubEl = document.getElementById('settle-sub');
  if (dohunAmt===0 && kyungeunAmt===0) {
    settleEl.textContent = '정산 없음';
    settleSubEl.textContent = '이번 달 지출이 없어요';
  } else {
    const total = dohunAmt + kyungeunAmt;
    const fair = total / 2;
    const diff = Math.abs(dohunAmt - kyungeunAmt);
    if (diff < 100) {
      settleEl.textContent = '🎉 완벽한 반반!';
      settleSubEl.textContent = `총 ${fmt(total)} 균등하게 나눴어요`;
    } else if (dohunAmt > kyungeunAmt) {
      settleEl.textContent = `경은 → 도훈 ${fmt(Math.round(diff/2))}`;
      settleSubEl.textContent = `도훈이 ${fmt(dohunAmt - fair)} 더 냈어요`;
    } else {
      settleEl.textContent = `도훈 → 경은 ${fmt(Math.round(diff/2))}`;
      settleSubEl.textContent = `경은이 ${fmt(kyungeunAmt - fair)} 더 냈어요`;
    }
  }
  // cat chart
  const cats = {};
  expenses.forEach(t=>{ cats[t.category]=(cats[t.category]||0)+Number(t.amount); });
  const total = Object.values(cats).reduce((s,v)=>s+v,0);
  const sorted = Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const catEl = document.getElementById('cat-chart');
  catEl.innerHTML = sorted.length===0
    ? `<div class="empty-state"><div class="empty-emoji">📊</div><div class="empty-text">데이터가 없어요</div></div>`
    : sorted.map(([cat,amt])=>`
        <div class="cat-bar">
          <div class="cat-bar-head"><span>${getCatEmoji(cat)} ${cat}</span><span>${fmt(amt)} (${total?Math.round(amt/total*100):0}%)</span></div>
          <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${total?amt/total*100:0}%"></div></div>
        </div>`).join('');
  // monthly
  const months = [];
  for (let i=3;i>=0;i--) {
    let m=currentMonth-i, y=currentYear;
    if(m<0){m+=12;y--;}
    const exp = localTxs.filter(tx=>{
      const d=new Date(tx.date);
      return d.getFullYear()===y&&d.getMonth()===m&&tx.type==='expense';
    }).reduce((s,t)=>s+Number(t.amount),0);
    months.push({label:`${m+1}월`, exp, isCurrent:i===0});
  }
  const maxExp = Math.max(...months.map(m=>m.exp),1);
  document.getElementById('monthly-bars').innerHTML = months.map(m=>`
    <div class="monthly-bar-wrap">
      <div class="monthly-bar ${m.isCurrent?'current':'prev'}"
           style="height:${Math.round(m.exp/maxExp*70)+4}px"></div>
      <div class="monthly-bar-label">${m.label}</div>
    </div>`).join('');
  document.getElementById('monthly-rows').innerHTML = months.map(m=>`
    <div class="monthly-row">
      <span style="${m.isCurrent?'font-weight:700;color:var(--brown)':''}">${m.label}</span>
      <span style="color:var(--rose);font-weight:600">${fmt(m.exp)}</span>
    </div>`).join('');
}

// ── CALENDAR ──
function renderCalendar() {
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
  const today = new Date();
  const dayLabels = ['일','월','화','수','목','금','토'];

  // build daily expense map
  const dailyExp = {};
  getMonthTx().filter(t=>t.type==='expense').forEach(t=>{
    const d = new Date(t.date).getDate();
    dailyExp[d] = (dailyExp[d]||0)+Number(t.amount);
  });
  const hasTx = {};
  getMonthTx().forEach(t=>{
    const d = new Date(t.date).getDate();
    hasTx[d] = true;
  });

  let html = dayLabels.map(d=>`<div class="cal-day-label">${d}</div>`).join('');
  // empty cells
  for(let i=0;i<firstDay;i++) html += `<div class="cal-day other-month"></div>`;
  for(let d=1;d<=daysInMonth;d++) {
    const isToday = today.getFullYear()===currentYear&&today.getMonth()===currentMonth&&today.getDate()===d;
    const isSelected = selectedCalDate===d;
    const expAmt = dailyExp[d];
    const cls = [
      'cal-day',
      isToday?'today':'',
      hasTx[d]?'has-tx':'',
      isSelected&&!isToday?'selected':''
    ].filter(Boolean).join(' ');
    html += `<div class="${cls}" onclick="selectCalDate(${d})">
      <span>${d}</span>
      ${expAmt?`<span class="cal-day-expense">${fmtShort(expAmt)}</span>`:''}
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
  if (selectedCalDate) renderCalDayTx(selectedCalDate);
}

function selectCalDate(d) {
  selectedCalDate = d;
  renderCalendar();
  renderCalDayTx(d);
}

function renderCalDayTx(d) {
  const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const txs = localTxs.filter(t=>t.date===dateStr);
  const label = document.getElementById('cal-selected-label');
  const list = document.getElementById('cal-tx-list');
  label.textContent = `${currentMonth+1}월 ${d}일 내역 (${txs.length}건)`;
  if (!txs.length) {
    list.innerHTML = `<div class="empty-state" style="padding:20px"><div class="empty-text">내역이 없어요</div></div>`;
    return;
  }
  list.innerHTML = txs.map(tx=>txHTML(tx)).join('');
}

function fmtShort(n) {
  if (n>=10000) return Math.round(n/10000)+'만';
  if (n>=1000) return Math.round(n/1000)+'천';
  return n+'';
}

// ── PAGE ──
function showPage(page) {
  ['home','add','chart','cal'].forEach(p=>{
    document.getElementById(`page-${p}`).classList.toggle('hidden', p!==page);
    document.getElementById(`nav-${p}`).classList.toggle('active', p===page);
  });
  if (page==='add') {
    document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];
    initAddForm();
  }
  if (page==='chart') renderChart();
  if (page==='cal') renderCalendar();
}

// ── HELPERS ──
function fmt(n) { return Number(n).toLocaleString('ko-KR')+'원'; }
function formatDate(dateStr) {
  const d = new Date(dateStr+'T00:00:00');
  const days=['일','월','화','수','목','금','토'];
  const today = new Date(); today.setHours(0,0,0,0);
  const dd = new Date(dateStr+'T00:00:00'); dd.setHours(0,0,0,0);
  const diff = (today-dd)/86400000;
  let prefix = diff===0?'오늘 · ':diff===1?'어제 · ':'';
  return prefix+`${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2200);
}
function renderAll() { renderSummary(); renderTxList(); }

// close modals on overlay click
document.getElementById('edit-modal').addEventListener('click', e=>{
  if (e.target===e.currentTarget) closeEditModal();
});
document.getElementById('detail-modal').addEventListener('click', e=>{
  if (e.target===e.currentTarget) closeDetailModal();
});
</script>
