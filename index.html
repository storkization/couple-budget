<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>도훈 & 경은 가계부 ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f3ef;--surface:#fff;--rose:#e8785a;--rose-light:#f5d5cc;--rose-dark:#c45c40;--green:#5a9e7a;--green-light:#c8e6d5;--green-dark:#3d7a58;--gold:#c9963a;--gold-light:#f0deb4;--brown:#3d2b1f;--brown2:#7a5c4a;--brown3:#b89080;--border:rgba(61,43,31,0.1);--shadow-sm:0 2px 8px rgba(61,43,31,0.08);--shadow-md:0 4px 20px rgba(61,43,31,0.12);--dohun:#4a7fa8;--dohun-light:#d0e6f5;--kyungeun:#c96ea0;--kyungeun-light:#f5d5ea;--r:16px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard','Gowun Dodum',sans-serif;background:var(--bg);color:var(--brown);min-height:100vh}
.hidden{display:none!important}
#login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;background:radial-gradient(ellipse at 30% 20%,#f5e6df,var(--bg) 60%),radial-gradient(ellipse at 80% 80%,#d5e8df,transparent 60%)}
.couple-photo-wrap{width:140px;height:140px;border-radius:50%;overflow:hidden;margin-bottom:20px;border:4px solid white;box-shadow:0 8px 32px rgba(232,120,90,0.3),0 0 0 2px var(--rose-light);animation:pulse 3s ease-in-out infinite}
.couple-photo{width:100%;height:100%;object-fit:cover}
.photo-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:56px;background:linear-gradient(135deg,var(--rose-light),var(--kyungeun-light))}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.login-title{font-size:28px;font-weight:700;margin-bottom:6px}
.login-names{font-size:15px;color:var(--brown2);margin-bottom:48px;display:flex;align-items:center;gap:8px}
.name-d{color:var(--dohun);font-weight:700}.name-k{color:var(--kyungeun);font-weight:700}
.google-btn{display:flex;align-items:center;gap:12px;background:white;border:1.5px solid var(--border);border-radius:16px;padding:14px 28px;font-family:inherit;font-size:15px;font-weight:600;color:var(--brown);cursor:pointer;box-shadow:var(--shadow-md);transition:all 0.2s}
.google-btn:hover{border-color:var(--rose);transform:translateY(-2px)}
.google-btn img{width:20px;height:20px}
.app-header{background:var(--surface);padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.header-left{display:flex;align-items:center}
.user-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;margin-right:8px}
.av-d{background:var(--dohun)}.av-k{background:var(--kyungeun)}
.user-name{font-size:14px;font-weight:600}
.logout-btn{background:var(--bg);border:none;border-radius:10px;padding:6px 12px;font-size:12px;color:var(--brown3);cursor:pointer;font-family:inherit}
.month-nav{background:var(--surface);padding:12px 20px;display:flex;align-items:center;justify-content:center;gap:20px;border-bottom:1px solid var(--border)}
.month-arrow{background:var(--bg);border:none;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;color:var(--brown2);display:flex;align-items:center;justify-content:center}
.month-label{font-size:18px;font-weight:700;min-width:110px;text-align:center}
.summary-wrap{padding:16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.sum-card{background:var(--surface);border-radius:var(--r);padding:14px 10px;text-align:center;box-shadow:var(--shadow-sm)}
.sum-icon{font-size:18px;margin-bottom:4px}.sum-label{font-size:10px;color:var(--brown3);margin-bottom:5px;font-weight:500}
.sum-amount{font-size:14px;font-weight:700}
.sum-card.income .sum-amount{color:var(--green)}.sum-card.expense .sum-amount{color:var(--rose)}.sum-card.balance .sum-amount{color:var(--gold)}
.budget-card{margin:0 16px 14px;background:var(--surface);border-radius:var(--r);padding:16px;box-shadow:var(--shadow-sm)}
.budget-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.budget-label{font-size:13px;color:var(--brown2);font-weight:600}.budget-info{font-size:13px;font-weight:700}
.budget-bar-bg{background:var(--bg);border-radius:99px;height:8px;overflow:hidden}
.budget-bar-fill{height:100%;border-radius:99px;transition:width 0.5s}
.budget-bar-fill.safe{background:linear-gradient(90deg,var(--green),var(--green-dark))}.budget-bar-fill.warn{background:linear-gradient(90deg,var(--gold),#e0a020)}.budget-bar-fill.over{background:linear-gradient(90deg,var(--rose),var(--rose-dark))}
.budget-row{display:flex;gap:8px;margin-top:10px}
.budget-input{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;font-family:inherit;font-size:13px;color:var(--brown);background:var(--bg);outline:none}
.budget-input:focus{border-color:var(--rose)}
.budget-set-btn{background:var(--rose);color:white;border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.tx-list{padding:0 16px 110px}.section-head{padding:0 16px 10px;font-size:14px;font-weight:700}
.date-group{margin-bottom:18px}.date-label{font-size:11px;font-weight:700;color:var(--brown3);margin-bottom:8px;padding-left:4px}
.tx-item{background:var(--surface);border-radius:14px;padding:13px 14px;display:flex;align-items:center;gap:12px;margin-bottom:7px;box-shadow:var(--shadow-sm);cursor:pointer;transition:all 0.15s;border-left:3px solid transparent}
.tx-item.expense{border-left-color:var(--rose)}.tx-item.income{border-left-color:var(--green)}
.tx-emoji{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tx-emoji.expense{background:var(--rose-light)}.tx-emoji.income{background:var(--green-light)}
.tx-middle{flex:1;min-width:0}
.tx-desc{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{display:flex;align-items:center;gap:6px;margin-top:3px}
.tx-cat{font-size:11px;color:var(--brown3)}
.tx-who{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;color:white}
.tx-who.d{background:var(--dohun)}.tx-who.k{background:var(--kyungeun)}
.tx-memo{font-size:11px;color:var(--brown3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-amount{font-size:15px;font-weight:700;flex-shrink:0}
.tx-amount.expense{color:var(--rose)}.tx-amount.income{color:var(--green)}
.empty-state{text-align:center;padding:48px 20px}.empty-emoji{font-size:48px;margin-bottom:12px}.empty-text{font-size:14px;color:var(--brown3);line-height:1.6}
.add-page{padding:16px 16px 110px}
.type-toggle{display:flex;gap:8px;margin-bottom:14px}
.type-btn{flex:1;padding:12px;border-radius:14px;border:2px solid transparent;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s}
.type-btn.expense{background:var(--rose-light);color:var(--rose-dark)}.type-btn.expense.active{background:var(--rose);color:white}
.type-btn.income{background:var(--green-light);color:var(--green-dark)}.type-btn.income.active{background:var(--green);color:white}
.form-card{background:var(--surface);border-radius:var(--r);padding:16px;box-shadow:var(--shadow-sm);margin-bottom:12px}
.form-label{font-size:12px;font-weight:700;color:var(--brown2);margin-bottom:8px;display:block}
.form-input,.form-select,.form-textarea{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:11px 14px;font-family:inherit;font-size:14px;color:var(--brown);background:var(--bg);outline:none;transition:border-color 0.2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--rose);background:white}
.form-textarea{resize:none;height:70px}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}.form-row1{margin-bottom:12px}
.who-toggle{display:flex;gap:8px}
.who-btn{flex:1;padding:10px;border-radius:12px;border:2px solid transparent;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s}
.who-btn.dohun{background:var(--dohun-light);color:var(--dohun)}.who-btn.dohun.active{background:var(--dohun);color:white}
.who-btn.kyungeun{background:var(--kyungeun-light);color:var(--kyungeun)}.who-btn.kyungeun.active{background:var(--kyungeun);color:white}
.amount-wrap{position:relative}.amount-wrap .form-input{padding-right:36px}
.amount-wrap .won{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--brown3);font-weight:600}
.quick-chips{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.quick-chip{padding:5px 12px;border-radius:99px;background:var(--bg);border:1.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;color:var(--brown2);font-family:inherit;transition:all 0.15s}
.quick-chip:hover{background:var(--rose-light);border-color:var(--rose);color:var(--rose-dark)}
.cat-chips{display:flex;flex-wrap:wrap;gap:7px}
.cat-chip{padding:7px 13px;border-radius:99px;border:1.5px solid var(--border);background:var(--bg);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:inherit}
.cat-chip.active{background:var(--rose);color:white;border-color:var(--rose-dark)}
.submit-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--rose),var(--rose-dark));color:white;border:none;border-radius:16px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(232,120,90,0.4);transition:all 0.2s}
.submit-btn:active{transform:scale(0.98)}
.chart-page{padding:16px 16px 110px}
.chart-card{background:var(--surface);border-radius:var(--r);padding:18px;box-shadow:var(--shadow-sm);margin-bottom:14px}
.chart-title{font-size:15px;font-weight:700;margin-bottom:16px}
.couple-split{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.couple-card{border-radius:var(--r);padding:16px;box-shadow:var(--shadow-sm)}
.couple-card.dc{background:linear-gradient(135deg,var(--dohun-light),#e8f4ff);border:1.5px solid rgba(74,127,168,0.2)}
.couple-card.kc{background:linear-gradient(135deg,var(--kyungeun-light),#fce8f4);border:1.5px solid rgba(201,110,160,0.2)}
.couple-name{font-size:13px;font-weight:700;margin-bottom:6px}.couple-name.d{color:var(--dohun)}.couple-name.k{color:var(--kyungeun)}
.couple-total{font-size:20px;font-weight:700}.couple-total.d{color:var(--dohun)}.couple-total.k{color:var(--kyungeun)}
.couple-sub{font-size:11px;color:var(--brown3);margin-top:3px}
.settle-box{background:var(--gold-light);border-radius:14px;padding:14px 16px;border:1.5px solid rgba(201,150,58,0.25);text-align:center;margin-bottom:14px}
.settle-text{font-size:14px;font-weight:700;color:var(--gold)}.settle-sub{font-size:12px;color:var(--brown3);margin-top:4px}
.cat-bar{margin-bottom:13px}.cat-bar-head{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;font-weight:600}
.cat-bar-head span:last-child{color:var(--brown3)}.cat-bar-bg{background:var(--bg);border-radius:99px;height:7px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--rose-light),var(--rose))}
.monthly-bars{display:flex;align-items:flex-end;gap:8px;height:90px;margin-bottom:10px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.bar-col{width:100%;border-radius:8px 8px 0 0;min-height:4px}
.bar-col.cur{background:linear-gradient(to top,var(--rose-dark),var(--rose))}.bar-col.prv{background:linear-gradient(to top,var(--rose-light),#f0c8be)}
.bar-label{font-size:11px;color:var(--brown3);font-weight:600}
.monthly-row{display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid var(--border)}.monthly-row:last-child{border-bottom:none}
.cal-page{padding:16px 16px 110px}
.cal-card{background:var(--surface);border-radius:var(--r);padding:16px;box-shadow:var(--shadow-sm)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day-label{text-align:center;font-size:11px;font-weight:700;color:var(--brown3);padding:6px 0}
.cal-day{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:13px;font-weight:600;gap:2px;transition:all 0.15s}
.cal-day:hover{background:var(--bg)}.cal-day.today{background:var(--rose);color:white}
.cal-day.other-month{color:var(--brown3);opacity:0.4;pointer-events:none}
.cal-day-exp{font-size:9px;color:var(--rose);font-weight:700}.cal-day.today .cal-day-exp{color:rgba(255,255,255,0.9)}
.modal-overlay{position:fixed;inset:0;background:rgba(30,20,15,0.5);z-index:500;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity 0.25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-sheet{background:var(--surface);border-radius:28px 28px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.34,1.2,0.64,1)}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:14px auto 0}
.modal-header{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:17px;font-weight:700}
.modal-close{background:var(--bg);border:none;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-body{padding:20px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;padding:10px 0 calc(10px + env(safe-area-inset-bottom));z-index:100;box-shadow:0 -4px 20px rgba(61,43,31,0.08)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:6px;font-family:inherit}
.nav-icon{font-size:24px;transition:transform 0.2s}.nav-lbl{font-size:10px;font-weight:600;color:var(--brown3)}
.nav-btn.active .nav-lbl{color:var(--rose)}.nav-btn.active .nav-icon{transform:scale(1.1)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--brown);color:white;border-radius:14px;padding:11px 20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all 0.3s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="login-screen">
  <div class="couple-photo-wrap">
    <img src="pic/introcouple.jpg" class="couple-photo" alt="도훈 & 경은" onerror="this.parentElement.innerHTML='<div class=&quot;photo-fallback&quot;>❤️</div>'">
  </div>
  <h2 class="login-title">우리 가계부</h2>
  <p class="login-names"><span class="name-d">도훈</span><span>❤️</span><span class="name-k">경은</span></p>
  <button class="google-btn" id="login-btn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">Google로 로그인
  </button>
</div>
<div id="app-screen" class="hidden">
  <div class="app-header">
    <div class="header-left"><div class="user-avatar av-d" id="user-avatar">도</div><span class="user-name" id="user-name">로딩중</span></div>
    <button class="logout-btn" id="logout-btn">로그아웃</button>
  </div>
  <div class="month-nav">
    <button class="month-arrow" id="prev-month">&#8249;</button>
    <span class="month-label" id="month-label"></span>
    <button class="month-arrow" id="next-month">&#8250;</button>
  </div>
  <div id="page-home">
    <div class="summary-wrap">
      <div class="sum-card income"><div class="sum-icon">💚</div><div class="sum-label">수입</div><div class="sum-amount" id="total-income">0원</div></div>
      <div class="sum-card expense"><div class="sum-icon">🌹</div><div class="sum-label">지출</div><div class="sum-amount" id="total-expense">0원</div></div>
      <div class="sum-card balance"><div class="sum-icon">✨</div><div class="sum-label">잔액</div><div class="sum-amount" id="total-balance">0원</div></div>
    </div>
    <div class="budget-card">
      <div class="budget-top"><span class="budget-label">🎯 이번 달 예산</span><span class="budget-info" id="budget-info">미설정</span></div>
      <div class="budget-bar-bg"><div class="budget-bar-fill safe" id="budget-bar" style="width:0%"></div></div>
      <div class="budget-row"><input class="budget-input" type="number" id="budget-input" placeholder="예산 입력 (원)"><button class="budget-set-btn" id="budget-set-btn">설정</button></div>
    </div>
    <div class="section-head">이번 달 내역</div>
    <div class="tx-list" id="tx-list"><div class="empty-state"><div class="empty-emoji">📭</div><div class="empty-text">내역을 불러오는 중...</div></div></div>
  </div>
  <div id="page-add" class="hidden">
    <div class="add-page">
      <div class="type-toggle"><button class="type-btn expense active" id="btn-expense">💸 지출</button><button class="type-btn income" id="btn-income">💰 수입</button></div>
      <div class="form-card"><label class="form-label">👤 누가 냈어요?</label><div class="who-toggle"><button class="who-btn dohun active" id="who-dohun">💙 도훈</button><button class="who-btn kyungeun" id="who-kyungeun">🩷 경은</button></div></div>
      <div class="form-card">
        <label class="form-label">💰 금액</label>
        <div class="amount-wrap"><input class="form-input" type="number" id="inp-amount" placeholder="0" inputmode="numeric"><span class="won">원</span></div>
        <div class="quick-chips"><button class="quick-chip" data-amt="1000">+1천</button><button class="quick-chip" data-amt="5000">+5천</button><button class="quick-chip" data-amt="10000">+1만</button><button class="quick-chip" data-amt="50000">+5만</button><button class="quick-chip" data-amt="100000">+10만</button></div>
      </div>
      <div class="form-card">
        <div class="form-row2"><div><label class="form-label">📅 날짜</label><input class="form-input" type="date" id="inp-date"></div><div><label class="form-label">📝 내용</label><input class="form-input" type="text" id="inp-desc" placeholder="예: 스타벅스"></div></div>
        <div class="form-row1"><label class="form-label">🏷️ 카테고리</label><div class="cat-chips" id="cat-chips-add"></div></div>
        <div class="form-row1" style="margin-bottom:0"><label class="form-label">💬 메모 (선택)</label><textarea class="form-textarea" id="inp-memo" placeholder="추가 메모..."></textarea></div>
      </div>
      <button class="submit-btn" id="submit-btn">+ 추가하기</button>
    </div>
  </div>
  <div id="page-chart" class="hidden">
    <div class="chart-page">
      <div class="couple-split"><div class="couple-card dc"><div class="couple-name d">💙 도훈</div><div class="couple-total d" id="dohun-total">0원</div><div class="couple-sub" id="dohun-count">0건</div></div><div class="couple-card kc"><div class="couple-name k">🩷 경은</div><div class="couple-total k" id="kyungeun-total">0원</div><div class="couple-sub" id="kyungeun-count">0건</div></div></div>
      <div class="settle-box"><div class="settle-text" id="settle-text">정산 없음</div><div class="settle-sub" id="settle-sub">이번 달 지출이 없어요</div></div>
      <div class="chart-card"><div class="chart-title">📊 카테고리별 지출</div><div id="cat-chart"></div></div>
      <div class="chart-card"><div class="chart-title">📈 최근 4개월</div><div class="monthly-bars" id="monthly-bars"></div><div id="monthly-rows"></div></div>
    </div>
  </div>
  <div id="page-cal" class="hidden">
    <div class="cal-page">
      <div class="cal-card"><div class="cal-grid" id="cal-grid"></div></div>
      <div style="margin-top:14px"><div class="section-head" id="cal-label">날짜를 선택하세요</div><div class="tx-list" id="cal-tx-list" style="padding-bottom:0"></div></div>
    </div>
  </div>
  <div class="bottom-nav">

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

const cfg={apiKey:"AIzaSyAiwlmOmYCrPvIMcL-DUkfxkuTM5REky3Q",authDomain:"draftpj-23a75.firebaseapp.com",projectId:"draftpj-23a75",storageBucket:"draftpj-23a75.firebasestorage.app",messagingSenderId:"209227761377",appId:"1:209227761377:web:d09607ee8076e1fec999a0"};
const app=initializeApp(cfg),db=getFirestore(app),auth=getAuth(app),prov=new GoogleAuthProvider(),txCol=collection(db,'transactions');
let cType='expense',cWho='dohun',cYear=new Date().getFullYear(),cMonth=new Date().getMonth(),txs=[],unsub=null,editId=null,eType='expense',eWho='dohun',eCat='',aCat='',selDay=null;
const CATS={expense:[{key:'식비',e:'🍚'},{key:'카페/간식',e:'☕'},{key:'교통',e:'🚌'},{key:'쇼핑',e:'🛍️'},{key:'데이트',e:'💑'},{key:'문화/여가',e:'🎬'},{key:'의료/건강',e:'💊'},{key:'생활/마트',e:'🏪'},{key:'술/회식',e:'🍺'},{key:'미용',e:'💅'},{key:'여행',e:'✈️'},{key:'기타',e:'📦'}],income:[{key:'월급',e:'💵'},{key:'용돈',e:'🎁'},{key:'부수입',e:'💼'},{key:'이자/배당',e:'📈'},{key:'환급',e:'🔄'},{key:'기타수입',e:'💫'}]};
function ce(k){return([...CATS.expense,...CATS.income].find(c=>c.key===k)||{e:'📦'}).e;}
function fmt(n){return Number(n).toLocaleString('ko-KR')+'원';}
function fs(n){return n>=10000?Math.round(n/10000)+'만':n>=1000?Math.round(n/1000)+'천':n+'';}
function fd(s){const d=new Date(s+'T00:00:00'),dy=['일','월','화','수','목','금','토'],t=new Date();t.setHours(0,0,0,0);const dd=new Date(s+'T00:00:00');dd.setHours(0,0,0,0);const df=(t-dd)/86400000;return(df===0?'오늘 · ':df===1?'어제 · ':'')+`${d.getMonth()+1}월 ${d.getDate()}일 (${dy[d.getDay()]})`;}
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}
function chips(id,cats,active,cb){const el=document.getElementById(id);if(!el)return;el.innerHTML=cats.map(c=>`<button class="cat-chip${c.key===active?' active':''}" data-key="${c.key}">${c.e} ${c.key}</button>`).join('');el.querySelectorAll('.cat-chip').forEach(b=>b.addEventListener('click',()=>cb(b.dataset.key)));}
function renderAll(){rSum();rList();}
// AUTH
document.getElementById('login-btn').addEventListener('click',async()=>{try{/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)?await signInWithRedirect(auth,prov):await signInWithPopup(auth,prov);}catch(e){toast('로그인 오류: '+e.message);}});
getRedirectResult(auth).catch(()=>{});
document.getElementById('logout-btn').addEventListener('click',()=>signOut(auth));
onAuthStateChanged(auth,u=>{
  if(u){
    document.getElementById('login-screen').classList.add('hidden');

    const av=document.getElementById('user-avatar');av.textContent=isK?'경':'도';av.className='user-avatar '+(isK?'av-k':'av-d');

  }else{
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('app-screen').classList.add('hidden');
    if(unsub)unsub();
  }
});
// MONTH
document.getElementById('prev-month').addEventListener('click',()=>{cMonth--;if(cMonth<0){cMonth=11;cYear--;}document.getElementById('month-label').textContent=`${cYear}년 ${cMonth+1}월`;renderAll();});
document.getElementById('next-month').addEventListener('click',()=>{cMonth++;if(cMonth>11){cMonth=0;cYear++;}document.getElementById('month-label').textContent=`${cYear}년 ${cMonth+1}월`;renderAll();});
function mTx(){return txs.filter(tx=>{const d=new Date(tx.date);return d.getFullYear()===cYear&&d.getMonth()===cMonth;});}
// BUDGET
document.getElementById('budget-set-btn').addEventListener('click',()=>{const v=parseInt(document.getElementById('budget-input').value);if(!v||v<=0)return toast('올바른 금액을 입력해주세요');localStorage.setItem(`b_${cYear}_${cMonth}`,v);rSum();toast('✅ 예산 설정 완료!');});
function rSum(){
  const mt=mTx(),inc=mt.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0),exp=mt.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0);
  document.getElementById('total-income').textContent=fmt(inc);document.getElementById('total-expense').textContent=fmt(exp);
  const bal=inc-exp,be=document.getElementById('total-balance');be.textContent=fmt(Math.abs(bal));be.style.color=bal>=0?'var(--gold)':'var(--rose)';
  const budget=parseInt(localStorage.getItem(`b_${cYear}_${cMonth}`)||'0'),bar=document.getElementById('budget-bar'),info=document.getElementById('budget-info');
  if(budget>0){const pct=Math.min(100,Math.round(exp/budget*100));info.textContent=`${fmt(exp)} / ${fmt(budget)} (${pct}%)`;bar.style.width=pct+'%';bar.className='budget-bar-fill '+(pct>=100?'over':pct>=80?'warn':'safe');document.getElementById('budget-input').value=budget;}
  else{info.textContent='미설정';bar.style.width='0%';}
}
// TX HTML
function txH(tx){const wc=tx.who==='kyungeun'?'k':'d',wl=tx.who==='kyungeun'?'경은':'도훈',sign=tx.type==='expense'?'-':'+';return `<div class="tx-item ${tx.type}" data-id="${tx.id}"><div class="tx-emoji ${tx.type}">${ce(tx.category)}</div><div class="tx-middle"><div class="tx-desc">${tx.desc}</div><div class="tx-meta"><span class="tx-cat">${tx.category}</span><span class="tx-who ${wc}">${wl}</span></div>${tx.memo?`<div class="tx-memo">💬 ${tx.memo}</div>`:''}</div><div class="tx-amount ${tx.type}">${sign}${fmt(Number(tx.amount))}</div></div>`;}
function bindClicks(c){c.querySelectorAll('.tx-item').forEach(el=>el.addEventListener('click',()=>openDetail(el.dataset.id)));}
function rList(){
  const mt=mTx().sort((a,b)=>new Date(b.date)-new Date(a.date)),c=document.getElementById('tx-list');
  if(!mt.length){c.innerHTML='<div class="empty-state"><div class="empty-emoji">📭</div><div class="empty-text">이번 달 내역이 없어요<br>+ 추가 버튼으로 기록해보세요</div></div>';return;}
  const g={};mt.forEach(tx=>{if(!g[tx.date])g[tx.date]=[];g[tx.date].push(tx);});
  c.innerHTML=Object.entries(g).map(([date,items])=>`<div class="date-group"><div class="date-label">${fd(date)}</div>${items.map(tx=>txH(tx)).join('')}</div>`).join('');
  bindClicks(c);
}
// DETAIL
function openDetail(id){
  const tx=txs.find(t=>t.id===id);if(!tx)return;
  const wl=tx.who==='kyungeun'?'🩷 경은':'💙 도훈',sign=tx.type==='expense'?'-':'+',color=tx.type==='expense'?'var(--rose)':'var(--green)';
  document.getElementById('detail-title').textContent=`${ce(tx.category)} ${tx.desc}`;
  document.getElementById('detail-body').innerHTML=`<div style="text-align:center;margin-bottom:20px"><div style="font-size:40px;margin-bottom:8px">${ce(tx.category)}</div><div style="font-size:28px;font-weight:800;color:${color}">${sign}${fmt(Number(tx.amount))}</div></div><div style="background:var(--bg);border-radius:14px;padding:16px;margin-bottom:16px">${dr('📅 날짜',fd(tx.date))}${dr('🏷️ 카테고리',`${ce(tx.category)} ${tx.category}`)}${dr('👤 누가',wl)}${tx.memo?dr('💬 메모',tx.memo):''}</div><div style="display:flex;gap:10px"><button id="d-edit" style="flex:1;padding:12px;background:var(--gold-light);border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--gold)">✏️ 수정</button><button id="d-del" style="flex:1;padding:12px;background:var(--rose-light);border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--rose)">🗑️ 삭제</button></div>`;
  document.getElementById('d-edit').addEventListener('click',()=>openEdit(id));
  document.getElementById('d-del').addEventListener('click',()=>delTx(id));
  document.getElementById('detail-modal').classList.add('open');
}
function dr(l,v){return `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px;color:var(--brown3)">${l}</span><span style="font-size:13px;font-weight:600">${v}</span></div>`;}
function closeDetail(){document.getElementById('detail-modal').classList.remove('open');}
document.getElementById('detail-close').addEventListener('click',closeDetail);
document.getElementById('detail-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeDetail();});
async function delTx(id){closeDetail();if(!confirm('삭제할까요?'))return;await deleteDoc(doc(db,'transactions',id));toast('🗑️ 삭제됐어요');}
// EDIT
function openEdit(id){
  closeDetail();const tx=txs.find(t=>t.id===id);if(!tx)return;
  editId=id;eType=tx.type;eWho=tx.who||'dohun';eCat=tx.category;
  document.getElementById('edit-btn-expense').classList.toggle('active',eType==='expense');
  document.getElementById('edit-btn-income').classList.toggle('active',eType==='income');
  document.getElementById('edit-who-dohun').classList.toggle('active',eWho==='dohun');
  document.getElementById('edit-who-kyungeun').classList.toggle('active',eWho==='kyungeun');
  document.getElementById('edit-amount').value=tx.amount;document.getElementById('edit-date').value=tx.date;document.getElementById('edit-desc').value=tx.desc;document.getElementById('edit-memo').value=tx.memo||'';
  chips('cat-chips-edit',CATS[eType],eCat,k=>{eCat=k;chips('cat-chips-edit',CATS[eType],eCat,arguments.callee);});
  document.getElementById('edit-modal').classList.add('open');
}
function closeEdit(){document.getElementById('edit-modal').classList.remove('open');}
document.getElementById('edit-close').addEventListener('click',closeEdit);
document.getElementById('edit-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeEdit();});
document.getElementById('edit-btn-expense').addEventListener('click',()=>{eType='expense';document.getElementById('edit-btn-expense').classList.add('active');document.getElementById('edit-btn-income').classList.remove('active');eCat=CATS.expense[0].key;chips('cat-chips-edit',CATS.expense,eCat,k=>{eCat=k;chips('cat-chips-edit',CATS.expense,eCat,arguments.callee);});});
document.getElementById('edit-btn-income').addEventListener('click',()=>{eType='income';document.getElementById('edit-btn-income').classList.add('active');document.getElementById('edit-btn-expense').classList.remove('active');eCat=CATS.income[0].key;chips('cat-chips-edit',CATS.income,eCat,k=>{eCat=k;chips('cat-chips-edit',CATS.income,eCat,arguments.callee);});});
document.getElementById('edit-who-dohun').addEventListener('click',()=>{eWho='dohun';document.getElementById('edit-who-dohun').classList.add('active');document.getElementById('edit-who-kyungeun').classList.remove('active');});
document.getElementById('edit-who-kyungeun').addEventListener('click',()=>{eWho='kyungeun';document.getElementById('edit-who-kyungeun').classList.add('active');document.getElementById('edit-who-dohun').classList.remove('active');});
document.getElementById('edit-save-btn').addEventListener('click',async()=>{
  const amount=parseInt(document.getElementById('edit-amount').value),date=document.getElementById('edit-date').value,desc=document.getElementById('edit-desc').value.trim(),memo=document.getElementById('edit-memo').value.trim();
  if(!amount||amount<=0)return toast('금액을 입력해주세요');if(!date)return toast('날짜를 선택해주세요');if(!desc)return toast('내용을 입력해주세요');
  await updateDoc(doc(db,'transactions',editId),{type:eType,amount,date,desc,memo,category:eCat,who:eWho});closeEdit();toast('✅ 수정됐어요!');
});
// ADD
function initAdd(){aCat=CATS[cType][0].key;chips('cat-chips-add',CATS[cType],aCat,k=>{aCat=k;chips('cat-chips-add',CATS[cType],aCat,arguments.callee);});}
document.getElementById('btn-expense').addEventListener('click',()=>{cType='expense';document.getElementById('btn-expense').classList.add('active');document.getElementById('btn-income').classList.remove('active');aCat=CATS.expense[0].key;chips('cat-chips-add',CATS.expense,aCat,k=>{aCat=k;chips('cat-chips-add',CATS.expense,aCat,arguments.callee);});});
document.getElementById('btn-income').addEventListener('click',()=>{cType='income';document.getElementById('btn-income').classList.add('active');document.getElementById('btn-expense').classList.remove('active');aCat=CATS.income[0].key;chips('cat-chips-add',CATS.income,aCat,k=>{aCat=k;chips('cat-chips-add',CATS.income,aCat,arguments.callee);});});
document.getElementById('who-dohun').addEventListener('click',()=>{cWho='dohun';document.getElementById('who-dohun').classList.add('active');document.getElementById('who-kyungeun').classList.remove('active');});
document.getElementById('who-kyungeun').addEventListener('click',()=>{cWho='kyungeun';document.getElementById('who-kyungeun').classList.add('active');document.getElementById('who-dohun').classList.remove('active');});
document.querySelectorAll('.quick-chip').forEach(b=>b.addEventListener('click',()=>{const i=document.getElementById('inp-amount');i.value=(parseInt(i.value)||0)+parseInt(b.dataset.amt);}));
document.getElementById('submit-btn').addEventListener('click',async()=>{
  const amount=parseInt(document.getElementById('inp-amount').value),date=document.getElementById('inp-date').value,desc=document.getElementById('inp-desc').value.trim(),memo=document.getElementById('inp-memo').value.trim();
  if(!amount||amount<=0)return toast('금액을 입력해주세요');if(!date)return toast('날짜를 선택해주세요');if(!desc)return toast('내용을 입력해주세요');
  try{await addDoc(txCol,{type:cType,amount,date,desc,memo,category:aCat,who:cWho,createdAt:new Date().toISOString()});document.getElementById('inp-amount').value='';document.getElementById('inp-desc').value='';document.getElementById('inp-memo').value='';toast('✅ 추가됐어요!');showPage('home');}catch(e){toast('오류: '+e.message);}
});
// CHART
function rChart(){
  const mt=mTx(),exp=mt.filter(t=>t.type==='expense');
  const dA=exp.filter(t=>t.who==='dohun').reduce((s,t)=>s+Number(t.amount),0),kA=exp.filter(t=>t.who==='kyungeun').reduce((s,t)=>s+Number(t.amount),0);
  document.getElementById('dohun-total').textContent=fmt(dA);document.getElementById('dohun-count').textContent=exp.filter(t=>t.who==='dohun').length+'건';
  document.getElementById('kyungeun-total').textContent=fmt(kA);document.getElementById('kyungeun-count').textContent=exp.filter(t=>t.who==='kyungeun').length+'건';
  const st=document.getElementById('settle-text'),ss=document.getElementById('settle-sub');
  if(dA===0&&kA===0){st.textContent='정산 없음';ss.textContent='이번 달 지출이 없어요';}
  else{const diff=Math.abs(dA-kA);if(diff<100){st.textContent='🎉 완벽한 반반!';ss.textContent=`총 ${fmt(dA+kA)} 균등 분담`;}else if(dA>kA){st.textContent=`경은 → 도훈 ${fmt(Math.round(diff/2))}`;ss.textContent=`도훈이 ${fmt(diff)} 더 냈어요`;}else{st.textContent=`도훈 → 경은 ${fmt(Math.round(diff/2))}`;ss.textContent=`경은이 ${fmt(diff)} 더 냈어요`;}}
  const cats={};exp.forEach(t=>{cats[t.category]=(cats[t.category]||0)+Number(t.amount);});const total=Object.values(cats).reduce((s,v)=>s+v,0);const sorted=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  document.getElementById('cat-chart').innerHTML=sorted.length===0?'<div class="empty-state"><div class="empty-emoji">📊</div><div class="empty-text">데이터가 없어요</div></div>':sorted.map(([cat,amt])=>`<div class="cat-bar"><div class="cat-bar-head"><span>${ce(cat)} ${cat}</span><span>${fmt(amt)} (${total?Math.round(amt/total*100):0}%)</span></div><div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${total?amt/total*100:0}%"></div></div></div>`).join('');
  const months=[];for(let i=3;i>=0;i--){let m=cMonth-i,y=cYear;if(m<0){m+=12;y--;}const e=txs.filter(tx=>{const d=new Date(tx.date);return d.getFullYear()===y&&d.getMonth()===m&&tx.type==='expense';}).reduce((s,t)=>s+Number(t.amount),0);months.push({label:`${m+1}월`,exp:e,cur:i===0});}
  const mx=Math.max(...months.map(m=>m.exp),1);
  document.getElementById('monthly-bars').innerHTML=months.map(m=>`<div class="bar-wrap"><div class="bar-col ${m.cur?'cur':'prv'}" style="height:${Math.round(m.exp/mx*70)+4}px"></div><div class="bar-label">${m.label}</div></div>`).join('');
  document.getElementById('monthly-rows').innerHTML=months.map(m=>`<div class="monthly-row"><span style="${m.cur?'font-weight:700':''}">${m.label}</span><span style="color:var(--rose);font-weight:600">${fmt(m.exp)}</span></div>`).join('');
}
// CALENDAR
function rCal(){
  const fd2=new Date(cYear,cMonth,1).getDay(),days=new Date(cYear,cMonth+1,0).getDate(),today=new Date(),dExp={};
  mTx().filter(t=>t.type==='expense').forEach(t=>{const d=new Date(t.date).getDate();dExp[d]=(dExp[d]||0)+Number(t.amount);});
  let h=['일','월','화','수','목','금','토'].map(d=>`<div class="cal-day-label">${d}</div>`).join('');
  for(let i=0;i<fd2;i++)h+=`<div class="cal-day other-month"></div>`;
  for(let d=1;d<=days;d++){const iT=today.getFullYear()===cYear&&today.getMonth()===cMonth&&today.getDate()===d,ex=dExp[d];h+=`<div class="cal-day${iT?' today':''}" data-day="${d}"><span>${d}</span>${ex?`<span class="cal-day-exp">${fs(ex)}</span>`:''}</div>`;}
  const grid=document.getElementById('cal-grid');grid.innerHTML=h;
  grid.querySelectorAll('.cal-day[data-day]').forEach(el=>el.addEventListener('click',()=>{selDay=parseInt(el.dataset.day);rCalDay(selDay);}));
  if(selDay)rCalDay(selDay);
}
function rCalDay(d){
  const ds=`${cYear}-${String(cMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,dt=txs.filter(t=>t.date===ds);
  document.getElementById('cal-label').textContent=`${cMonth+1}월 ${d}일 내역 (${dt.length}건)`;
  const list=document.getElementById('cal-tx-list');
  if(!dt.length){list.innerHTML='<div class="empty-state" style="padding:20px"><div class="empty-text">내역이 없어요</div></div>';return;}
  list.innerHTML=dt.map(tx=>txH(tx)).join('');
  list.querySelectorAll('.tx-item').forEach(el=>el.addEventListener('click',()=>openDetail(el.dataset.id)));
}
// PAGE NAV
function showPage(p){
  ['home','add','chart','cal'].forEach(pg=>{document.getElementById(`page-${pg}`).classList.toggle('hidden',pg!==p);document.getElementById(`nav-${pg}`).classList.toggle('active',pg===p);});
  if(p==='add'){document.getElementById('inp-date').value=new Date().toISOString().split('T')[0];initAdd();}
  if(p==='chart')rChart();if(p==='cal')rCal();
}
document.getElementById('nav-home').addEventListener('click',()=>showPage('home'));
document.getElementById('nav-add').addEventListener('click',()=>showPage('add'));
document.getElementById('nav-chart').addEventListener('click',()=>showPage('chart'));
document.getElementById('nav-cal').addEventListener('click',()=>showPage('cal'));
</script>
</body>
